        function debounce(fn, delay, immediate = false) {
            let timer = null;

            return function (...args) {
                // ① args: 收集所有传入的参数
                // 例如：传入 'js', 1, 10 → args = ['js', 1, 10]

                const context = this;
                // ② context: 保存正确的 this 指向

                if (timer) clearTimeout(timer);

                if (immediate && !timer) {
                    // 立即执行：直接调用原函数
                    fn.apply(context, args);
                    // 设置定时器，防止短时间内再次立即执行
                    timer = setTimeout(() => {
                        timer = null;
                    }, delay);
                } else {
                    // 延迟执行：设置定时器
                    timer = setTimeout(() => {
                        // ③ 使用 apply 调用原函数
                        // fn.apply(context, args) 等价于：
                        // context.fn(...args)
                        fn.apply(context, args);
                        timer = null;
                    }, delay);
                }
            };
        }

        function memoizePromise(fn) {
            const cache = new Map(); // 使用 Map 存储缓存结果

            return async function (...args) {
                // 生成缓存键（可以用参数序列化，或者更精细的控制）
                const key = JSON.stringify(args);

                // 如果已经有缓存，直接返回
                if (cache.has(key)) {
                    console.log('返回缓存结果', key);
                    return cache.get(key);
                }
                const promise = fn(...args);
                cache.set(key, promise);
                console.log('缓存结果', key, promise);

                // 没有缓存，执行原函数
                try {
                    const result = await promise;
                    console.log('✅ 请求完成:', key);
                    return result;
                } catch (error) {
                    // 失败时清理缓存
                    cache.delete(key);
                    throw error;
                }
            };
        }

        // 使用示例
        async function fetchUser(id) {
            console.log('实际请求:', id);
            // 模拟异步请求
            return new Promise(resolve => {
                setTimeout(() => resolve({ id, name: `User ${id}` }), 1000);
            });
        }

        const memoizedFetchUser = memoizePromise(fetchUser);

        // 第一次调用：会执行实际请求
        memoizedFetchUser(1).then(console.log); // 输出: 实际请求: 1, { id: 1, name: 'User 1' }

        // 第二次调用相同参数：直接返回缓存结果
        memoizedFetchUser(1).then(console.log); // 输出: 返回缓存结果, { id: 1, name: 'User 1' }

    <script>
        class TodoList {
            constructor(containerId) {
                this.container = document.getElementById(containerId);
                this.todos = [];
                this.render();
                this.bindEvents();
            }

            addTodo(text) {
                this.todos.push({
                    id: Date.now().toLocaleString(),
                    text: text,
                    completed: false
                });
                this.render();
            }

            toggleTodo(id) {
                const todo = this.todos.find(t => t.id === id);
                if (todo) todo.completed = !todo.completed;
                this.render();
            }

            deleteTodo(id) {
                this.todos = this.todos.filter(t => t.id !== id);
                this.render();
            }

            render() {
                // 清空容器
                this.container.innerHTML = '';

                if (this.todos.length === 0) {
                    this.container.innerHTML = '<p class="empty">暂无待办事项</p>';
                    return;
                }

                // 创建列表
                const ul = document.createElement('ul');
                ul.className = 'todo-list';

                this.todos.forEach(todo => {
                    const li = document.createElement('li');
                    li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                    li.setAttribute('data-id', todo.id);

                    // 复选框
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.checked = todo.completed;
                    checkbox.addEventListener('change', () => this.toggleTodo(todo.id));

                    // 文本
                    const text = document.createElement('span');
                    text.textContent = todo.text;
                    text.className = 'todo-text';

                    // 删除按钮
                    const deleteBtn = document.createElement('button');
                    deleteBtn.textContent = '删除';
                    deleteBtn.className = 'delete-btn';
                    deleteBtn.addEventListener('click', () => this.deleteTodo(todo.id));

                    li.appendChild(checkbox);
                    li.appendChild(text);
                    li.appendChild(deleteBtn);
                    ul.appendChild(li);
                });

                this.container.appendChild(ul);
            }

            bindEvents() {
                // 添加待办的表单
                const form = document.createElement('form');
                form.className = 'todo-form';
                form.innerHTML = `
            <input type="text" placeholder="输入待办事项" class="todo-input">
            <button type="submit">添加</button>
        `;

                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const input = form.querySelector('.todo-input');
                    const text = input.value.trim();
                    if (text) {
                        this.addTodo(text);
                        input.value = '';
                    }
                });

                // 将表单插入到容器前面
                this.container.parentNode.insertBefore(form, this.container);
            }
        }

        // 使用
        const todoApp = new TodoList('todo-container');
    </script>

    <h1>三种修改URL方式对比</h1>

    <!-- 方式1：普通跳转（刷新页面） -->
    <div style="border:.0625rem solid #ccc; padding:1.25rem; margin:.625rem 0;">
        <h2>方式1：普通跳转（页面刷新）</h2>

        <h2>方式3：replaceState（替换记录，不能后退）</h2>

        <button onclick="replaceStatePage(2)">第2页</button>
        <button onclick="replaceStatePage(3)">第3页</button>

    <div id="content" style="background:#f0f0f0; padding:1.25rem; margin:1.25rem 0;">

    <p><strong>当前地址栏:</strong> <span id="urlDisplay"></span></p>
    <p><strong>历史记录数量:</strong> <span id="historyCount"></span></p>

    <script>
        // 显示当前地址和历史记录数
        function updateDisplay() {
            document.getElementById('urlDisplay').innerHTML = window.location.href;
            document.getElementById('historyCount').innerHTML = history.length;
        }
        updateDisplay();

        // ========== 方式1：普通跳转（刷新页面） ==========
        function normalJump(page) {
            // 直接跳转，页面会刷新
            window.location.href = "?page=" + page;
            // 注意：这行之后的代码不会执行，因为页面已经刷新了
        }

        // ========== 方式2：pushState（添加记录） ==========
        function pushStatePage(page) {
            // 1. 改地址栏（添加新记录）
            history.pushState({ page: page }, "", "?page=" + page);

            // 2. 手动改页面内容
            document.getElementById('pageTitle').innerHTML = "第" + page + "页";
            document.querySelector('#content p').innerHTML = "这是第" + page + "页的内容（pushState）";

            // 3. 更新显示
            updateDisplay();
            console.log('pushState 后历史记录数:', history.length);
        }

        // ========== 方式3：replaceState（替换记录） ==========
        function replaceStatePage(page) {
            // 1. 改地址栏（替换当前记录）
            history.replaceState({ page: page }, "", "?page=" + page);

            // 2. 手动改页面内容
            document.getElementById('pageTitle').innerHTML = "第" + page + "页";
            document.querySelector('#content p').innerHTML = "这是第" + page + "页的内容（replaceState）";

            // 3. 更新显示
            updateDisplay();
            console.log('replaceState 后历史记录数:', history.length);
        }

        // 监听后退/前进按钮
        window.addEventListener('popstate', (event) => {
            let page = event.state ? event.state.page : 1;
            document.getElementById('pageTitle').innerHTML = "第" + page + "页";
            document.querySelector('#content p').innerHTML = "这是第" + page + "页的内容（后退回来的）";
            updateDisplay();
            console.log('popstate 触发，当前页:', page);
        });

        // 页面加载时，根据当前 URL 显示内容
        const urlParams = new URLSearchParams(window.location.search);
        const currentPage = urlParams.get('page') || 1;
        document.getElementById('pageTitle').innerHTML = "第" + currentPage + "页";
        document.querySelector('#content p').innerHTML = "这是第" + currentPage + "页的内容（初始加载）";
    </script>
    <div class="draggable" style="width: 100px; height: 100px; background-color: red;">23</div>
    <script>
        class Draggable {
            constructor(element) {
                this.element = element;
                this.isDragging = false;
                this.startX = 0;
                this.startY = 0;
                this.currentX = 0;
                this.currentY = 0;

                // 鼠标按下：开始拖拽
                this.element.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    this.isDragging = true;

                    // 记录鼠标按下的初始位置
                    this.startX = e.clientX - this.currentX;
                    this.startY = e.clientY - this.currentY;

                    // 绑定全局事件
                    document.addEventListener('mousemove', this.onMouseMove);
                    document.addEventListener('mouseup', this.onMouseUp);
                });

                // 绑定方法（为了能正确移除）
                this.onMouseMove = this.onMouseMove.bind(this);
                this.onMouseUp = this.onMouseUp.bind(this);
            }

            onMouseMove(e) {
                if (!this.isDragging) return;

                // 计算新位置
                this.currentX = e.clientX - this.startX;
                this.currentY = e.clientY - this.startY;

                // 应用位置
                this.element.style.transform = `translate(${this.currentX}px, ${this.currentY}px)`;
            }

            onMouseUp() {
                this.isDragging = false;

                // 移除全局事件
                document.removeEventListener('mousemove', this.onMouseMove);

    <div class="container">
        <h1>无限滚动</h1>
        <div id="list" class="list"></div>

    <script>
        class InfiniteScroll {
            constructor(options) {
                this.container = options.container;      // 容器元素
                this.loadMore = options.loadMore;        // 加载数据的函数
                this.pageSize = options.pageSize || 20;  // 每页数量
                this.threshold = options.threshold || 100; // 提前加载距离(px)

                this.page = 1;          // 当前页码
                this.loading = false;   // 是否正在加载
                this.hasMore = true;    // 是否还有更多数据
                this.observer = null;   // IntersectionObserver 实例

                this.init();
            }

            init() {
                // 创建底部加载指示器
                this.createLoader();

                // 使用 IntersectionObserver 监听加载器
                this.initObserver();

                // 首次加载
                this.loadMoreData();
            }

            createLoader() {
                // 创建加载器元素
                this.loader = document.createElement('div');
                this.loader.className = 'loading';
                this.loader.innerHTML = '<div class="spinner"></div> 加载中...';
                this.container.appendChild(this.loader);
            }

            initObserver() {
                // 创建 IntersectionObserver
                this.observer = new IntersectionObserver(
                    (entries) => {
                        entries.forEach(entry => {
                            // 当加载器进入可视区域时，加载更多
                            if (entry.isIntersecting && !this.loading && this.hasMore) {
                                this.loadMoreData();
                            }
                        });
                    },
                    {
                        root: null,           // 视口
                        threshold: 0.1,       // 10% 进入时触发
                        rootMargin: `0px 0px ${this.threshold}px 0px`  // 提前触发
                    }
                );

                // 开始观察加载器
                this.observer.observe(this.loader);
            }

            async loadMoreData() {
                if (this.loading || !this.hasMore) return;

                this.loading = true;

                try {
                    // 调用用户提供的加载函数
                    const newData = await this.loadMore(this.page, this.pageSize);
                    if (newData && newData.length > 0) {
                        // 渲染数据
                        this.renderData(newData);
                        this.page++;
                    } else {
                        // 没有更多数据
                        this.hasMore = false;
                        this.showNoMore();
                    }
                } catch (error) {
                    console.error('加载失败:', error);
                    this.showError();
                } finally {
                    this.loading = false;
                }
            }

            renderData(data) {
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'item';
                    div.textContent = item.text || item;
                    // 在加载器之前插入
                    this.container.insertBefore(div, this.loader);
                });
            }

            showNoMore() {
                this.loader.className = 'no-more';
                this.loader.innerHTML = '没有更多数据了';

                // 停止观察
                if (this.observer) {
                    this.observer.unobserve(this.loader);
                }
            }

            showError() {
                this.loader.className = 'error';
                this.loader.innerHTML = '加载失败，点击重试';
                this.loader.style.cursor = 'pointer';

                // 点击重试
                this.loader.onclick = () => {
                    this.loader.className = 'loading';
                    this.loader.innerHTML = '<div class="spinner"></div> 加载中...';
                    this.loadMoreData();
                };
            }

            // 重置滚动（用于重新加载）
            reset() {
                this.page = 1;
                this.hasMore = true;
                this.loading = false;

                // 清空容器（保留加载器）
                const items = this.container.querySelectorAll('.item');
                items.forEach(item => item.remove());

                // 重置加载器
                this.loader.className = 'loading';
                this.loader.innerHTML = '<div class="spinner"></div> 加载中...';
                this.loader.onclick = null;

                // 重新观察
                if (this.observer) {
                    this.observer.unobserve(this.loader);
                    this.observer.observe(this.loader);
                }

                // 重新加载
                this.loadMoreData();
            }
        }

        // ========== 使用示例 ==========

        // 模拟 API 请求
        function fetchData(page, pageSize) {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    // 模拟数据
                    const start = (page - 1) * pageSize;
                    const data = [];

                    // 总共只有 5 页数据
                    if (page <= 5) {
                        for (let i = 0; i < pageSize; i++) {
                            const id = start + i + 1;
                            data.push({
                                id: id,
                                text: `第 ${page} 页 - 第 ${i + 1} 条数据 (ID: ${id})`
                            });
                        }
                    }
                    resolve(data);
                    reject(new Error('加载失败'));
                }, 500); // 模拟网络延迟
            });
        }

        // 初始化无限滚动
        const container = document.getElementById('list');
        const infiniteScroll = new InfiniteScroll({
            container: container,
            loadMore: (page, pageSize) => fetchData(page, pageSize),
            pageSize: 10,
            threshold: 200  // 距离底部 200px 时提前加载
        });

        // 可选：添加重置按钮
        const resetBtn = document.createElement('button');
        resetBtn.textContent = '重置';
        resetBtn.style.marginBottom = '10px';
        resetBtn.onclick = () => infiniteScroll.reset();
        container.parentNode.insertBefore(resetBtn, container);
    </script>

            // 重置UI
            uploadBtn.disabled = true;
            progressBar.style.width = '0%';
            progressBar.textContent = '0%';
            progressBar.style.backgroundColor = '';
            info.innerHTML = '';
            startTime = Date.now();

            // 创建 FormData
            const formData = new FormData();
            formData.append('file', file);
            formData.append('filename', file.name);
            formData.append('size', file.size);

            try {
                // 使用 axios 发送，带进度监听
                let count = 0;
                const response = await axios.post('https://httpbin.org/post', formData, {
                    onUploadProgress: (progressEvent) => {
                        count++;
                        // 计算百分比
                        const percent = (progressEvent.loaded / progressEvent.total) * 100;
                        progressBar.style.width = percent + '%';
                        progressBar.textContent = percent.toFixed(2) + '%';

                        // 计算上传速度
                        const elapsed = (Date.now() - startTime) / 1000; // 秒
                        const speed = (progressEvent.loaded / 1024 / elapsed).toFixed(2);
                        console.log(`第${count}次触发，进度：${percent.toFixed(2)}%`);
                        info.innerHTML = `
                            📊 已上传：${(progressEvent.loaded / 1024).toFixed(2)} KB / ${(progressEvent.total / 1024).toFixed(2)} KB<br>
                            ⚡ 速度：${speed} KB/s<br>
                            📁 文件名：${file.name}
                        `;
                    }
                });

                // 上传成功
                progressBar.style.backgroundColor = '#4caf50';
                info.innerHTML += `<br>✅ 上传成功！服务器返回：${JSON.stringify(response.data.files)}`;

            } catch (error) {
                // 上传失败
                progressBar.style.backgroundColor = '#f44336';
                info.innerHTML += `<br>❌ 上传失败：${error.message}`;
            } finally {
                uploadBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
